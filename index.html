<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quality Tracker - Preciado</title>
    <!-- Tailwind CSS para estilos rápidos y móviles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Chart.js para el Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f3f4f6; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        input, select, textarea { font-size: 16px !important; /* Evita zoom en iOS */ }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Loader */
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-50 bg-blue-600 flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
            <div class="text-center mb-6">
                <i class="fa-solid fa-shirt text-5xl text-blue-600 mb-3"></i>
                <h1 class="text-2xl font-bold text-gray-800">Quality Control</h1>
                <p class="text-gray-500 text-sm">Área de Calidad - Preciado</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                    <input type="text" id="username" value="Preciado" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg mt-2">
                    Iniciar Sesión
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden mt-2"></p>            </form>
        </div>
    </div>

    <!-- APP PRINCIPAL (Oculta hasta login) -->
    <div id="app-container" class="hidden flex-col h-full max-w-md mx-auto w-full bg-gray-50 shadow-2xl relative">
        
        <!-- Header -->
        <header class="bg-white p-4 shadow-sm flex justify-between items-center z-10">
            <h2 class="font-bold text-lg text-blue-800"><i class="fa-solid fa-clipboard-check mr-2"></i>Registro Diario</h2>
            <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-right-from-bracket text-xl"></i></button>
        </header>

        <!-- Contenido Scrollable -->
        <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-4" id="main-content">
            <!-- Las vistas se inyectan aquí vía JS -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full max-w-md flex justify-around py-3 z-20 safe-area-pb">
            <button onclick="showView('register')" class="nav-btn flex flex-col items-center text-blue-600" data-view="register">
                <i class="fa-solid fa-plus-circle text-2xl mb-1"></i>
                <span class="text-xs font-medium">Registrar</span>
            </button>
            <button onclick="showView('dashboard')" class="nav-btn flex flex-col items-center text-gray-400 hover:text-blue-600" data-view="dashboard">
                <i class="fa-solid fa-chart-pie text-2xl mb-1"></i>
                <span class="text-xs font-medium">Dashboard</span>
            </button>
        </nav>
    </div>

    <!-- MODAL AGREGAR CATEGORÍA -->
    <div id="modal-new-cat" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-6 w-full max-w-xs fade-in">
            <h3 class="font-bold text-lg mb-4">Nueva Categoría</h3>
            <input type="text" id="new-cat-name" placeholder="Ej. Bebe Recién Nacido" class="w-full border p-3 rounded-lg mb-4 text-base">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-2 text-gray-600 bg-gray-100 rounded-lg">Cancelar</button>
                <button onclick="saveNewCategory()" class="flex-1 py-2 text-white bg-blue-600 rounded-lg">Guardar</button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- CONFIGURACIÓN SUPABASE ---
        const SUPABASE_URL = 'https://qveircqtcwklwwimedwj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2ZWlyY3F0Y3drbHd3aW1lZHdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY1NTcsImV4cCI6MjA5NTM4MjU1N30.k-f1RV5WBevKyH3fowzqcya5HrRajZcFD3nFID4WRkQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        // --- ESTADO GLOBAL ---
        let currentUser = null;
        let dailyItems = []; // Items temporales antes de guardar
        let categoriasList = [];
        let prendasList = [];
        let currentChart = null;

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            loadCatalogs();
        });

        async function checkSession() {
            // En una app real usaríamos supabase.auth, pero usaremos tu tabla custom
            const storedUser = localStorage.getItem('qt_user');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                showApp();
            }
        }

        async function loadCatalogs() {
            const [{ data: cats }, { data: prendas }] = await Promise.all([
                supabase.from('categorias').select('*').eq('activo', true).order('nombre'),
                supabase.from('tipos_prenda').select('*').eq('activo', true).order('nombre')
            ]);
            categoriasList = cats || [];
            prendasList = prendas || [];
        }

        // --- AUTH ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errEl = document.getElementById('login-error');

            // NOTA: En producción NUNCA hagas esto. Deberías usar Supabase Auth RPC o Edge Functions.
            // Para tu app personal con RLS desactivado, esto funciona como validación simple.
            const { data, error } = await supabase
                .from('usuarios')
                .select('*')
                .eq('username', user)
                .single();

            if (error || !data || data.password !== pass) {
                errEl.textContent = "Usuario o contraseña incorrectos";
                errEl.classList.remove('hidden');
                return;            }

            currentUser = { id: data.id, username: data.username };
            localStorage.setItem('qt_user', JSON.stringify(currentUser));
            showApp();
        });

        function logout() {
            localStorage.removeItem('qt_user');
            location.reload();
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('flex');
            showView('register');
        }

        // --- NAVEGACIÓN Y VISTAS ---
        function showView(viewName) {
            // Actualizar tabs
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const isActive = btn.dataset.view === viewName;
                btn.classList.toggle('text-blue-600', isActive);
                btn.classList.toggle('text-gray-400', !isActive);
            });

            const container = document.getElementById('main-content');
            container.innerHTML = '';

            if (viewName === 'register') renderRegisterView(container);
            if (viewName === 'dashboard') renderDashboardView(container);
        }

        // --- VISTA REGISTRO ---
        function renderRegisterView(container) {
            const catOptions = categoriasList.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
            const prendaOptions = prendasList.map(p => `<option value="${p.nombre}">${p.nombre}</option>`).join('');

            const html = `
                <div class="fade-in space-y-4">
                    <!-- Tarjeta de Resumen Temporal -->
                    <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-blue-600 font-bold uppercase tracking-wide">Sesión Actual</p>
                            <p class="text-2xl font-bold text-blue-900">${dailyItems.reduce((acc, i) => acc + i.cantidad, 0)} <span class="text-sm font-normal text-blue-700">piezas</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-blue-600 font-bold uppercase tracking-wide">Suéteres (÷4)</p>                            <p class="text-2xl font-bold text-blue-900">${(dailyItems.reduce((acc, i) => acc + i.cantidad, 0) / 4).toFixed(2)}</p>
                        </div>
                    </div>

                    <!-- Formulario Item -->
                    <div class="bg-white rounded-xl shadow-sm p-5 space-y-3 border border-gray-100">
                        <h3 class="font-bold text-gray-700 mb-2"><i class="fa-solid fa-box-open mr-2 text-blue-500"></i>Nuevo Paquete</h3>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs text-gray-500 ml-1">Tipo Prenda</label>
                                <select id="reg-prenda" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                                    ${prendaOptions}
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-gray-500 ml-1">Categoría</label>
                                <div class="relative">
                                    <select id="reg-categoria" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none appearance-none pr-8">
                                        ${catOptions}
                                        <option value="__NEW__">➕ Agregar Nueva...</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down absolute right-3 top-4 text-gray-400 pointer-events-none text-xs"></i>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs text-gray-500 ml-1">No. Paquetes</label>
                                <input type="number" id="reg-paquetes" min="1" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0">
                            </div>
                            <div>
                                <label class="text-xs text-gray-500 ml-1">Piezas/Paquete</label>
                                <input type="number" id="reg-piezas" min="1" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0">
                            </div>
                        </div>

                        <button onclick="addItemToSession()" class="w-full bg-gray-900 text-white py-3 rounded-lg font-medium hover:bg-gray-800 transition active:scale-[0.98]">
                            <i class="fa-solid fa-plus mr-2"></i>Agregar a Lista
                        </button>
                    </div>

                    <!-- Lista de Items Agregados -->
                    ${dailyItems.length > 0 ? `
                        <div class="space-y-2">
                            <h4 class="text-sm font-bold text-gray-500 ml-1">PAQUETES EN SESIÓN (${dailyItems.length})</h4>
                            ${dailyItems.map((item, idx) => `
                                <div class="bg-white p-3 rounded-lg border-l-4 border-blue-500 shadow-sm flex justify-between items-center">
                                    <div>                                        <p class="font-bold text-gray-800">${item.tipo_prenda} - ${item.categoria}</p>
                                        <p class="text-xs text-gray-500">${item.paquetes} pqtes × ${item.piezas_por_paquete} pzs</p>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="font-bold text-blue-700">${item.cantidad} pzs</span>
                                        <button onclick="removeItem(${idx})" class="text-red-400 hover:text-red-600 p-2"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    <!-- Observación y Guardar Final -->
                    ${dailyItems.length > 0 ? `
                        <div class="bg-white rounded-xl shadow-sm p-5 space-y-3 border border-gray-100 mt-4">
                            <label class="text-sm font-bold text-gray-700">Observaciones del Día</label>
                            <textarea id="reg-obs" rows="2" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Ej. Se revisó menos por cambio de línea..."></textarea>
                            
                            <button onclick="saveFullDay()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-green-700 transition active:scale-[0.98]">
                                <i class="fa-solid fa-save mr-2"></i>GUARDAR DÍA
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
            container.innerHTML = html;

            // Listener para nueva categoría
            setTimeout(() => {
                const catSelect = document.getElementById('reg-categoria');
                if(catSelect) {
                    catSelect.addEventListener('change', (e) => {
                        if(e.target.value === '__NEW__') {
                            document.getElementById('modal-new-cat').classList.remove('hidden');
                            e.target.selectedIndex = 0; // Reset select
                        }
                    });
                }
            }, 0);
        }

        // --- LÓGICA DE REGISTRO ---
        function addItemToSession() {
            const prenda = document.getElementById('reg-prenda').value;
            const categoria = document.getElementById('reg-categoria').value;
            const paquetes = parseInt(document.getElementById('reg-paquetes').value) || 0;
            const piezas = parseInt(document.getElementById('reg-piezas').value) || 0;

            if (!categoria || paquetes <= 0 || piezas <= 0) {
                alert("Por favor llena todos los campos correctamente");                return;
            }

            dailyItems.push({
                tipo_prenda: prenda,
                categoria: categoria,
                paquetes: paquetes,
                piezas_por_paquete: piezas,
                cantidad: paquetes * piezas
            });

            // Re-renderizar para actualizar lista y totales
            renderRegisterView(document.getElementById('main-content'));
        }

        function removeItem(index) {
            dailyItems.splice(index, 1);
            renderRegisterView(document.getElementById('main-content'));
        }

        async function saveNewCategory() {
            const name = document.getElementById('new-cat-name').value.trim();
            if(!name) return;

            const { data, error } = await supabase.from('categorias').insert({ nombre: name }).select().single();
            
            if(error) {
                alert("Error al crear categoría (¿ya existe?)");
            } else {
                categoriasList.push(data);
                categoriasList.sort((a,b) => a.nombre.localeCompare(b.nombre));
                closeModal();
                document.getElementById('new-cat-name').value = '';
                // Re-renderizar para mostrar la nueva opción
                renderRegisterView(document.getElementById('main-content'));
                // Seleccionar la nueva automáticamente después del render
                setTimeout(() => {
                    const sel = document.getElementById('reg-categoria');
                    if(sel) sel.value = name;
                }, 50);
            }
        }

        function closeModal() {
            document.getElementById('modal-new-cat').classList.add('hidden');
        }

        async function saveFullDay() {
            if(!confirm(`¿Guardar ${dailyItems.length} paquetes y finalizar registro de hoy?`)) return;
            const obs = document.getElementById('reg-obs').value;
            const totalPiezas = dailyItems.reduce((acc, i) => acc + i.cantidad, 0);
            const totalSueteres = totalPiezas / 4;

            // 1. Crear registro padre
            const { data: reg, error: regErr } = await supabase.from('registros').insert({
                usuario_id: currentUser.id,
                total_piezas: totalPiezas,
                total_sueteres: totalSueteres,
                observacion: obs
            }).select().single();

            if(regErr) { alert("Error al guardar registro principal"); console.error(regErr); return; }

            // 2. Insertar items en batch
            const itemsToInsert = dailyItems.map(item => ({
                registro_id: reg.id,
                ...item
            }));

            const { error: itemsErr } = await supabase.from('registro_items').insert(itemsToInsert);

            if(itemsErr) { alert("Error al guardar detalles"); console.error(itemsErr); return; }

            // Éxito
            alert(`✅ Día guardado exitosamente.\nTotal: ${totalPiezas} piezas (${totalSueteres} suéteres)`);
            dailyItems = [];
            renderRegisterView(document.getElementById('main-content'));
        }

        // --- VISTA DASHBOARD ---
        async function renderDashboardView(container) {
            container.innerHTML = `
                <div class="fade-in space-y-4">
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                        <h3 class="font-bold text-gray-700 mb-3"><i class="fa-solid fa-filter mr-2 text-blue-500"></i>Filtrar Periodo</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs text-gray-500">Mes</label>
                                <select id="dash-month" class="w-full bg-gray-50 border rounded-lg p-2 text-sm">
                                    ${Array.from({length:12}, (_,i) => `<option value="${i+1}" ${i+1 === new Date().getMonth()+1 ? 'selected':''}>${new Date(0, i).toLocaleString('es', {month:'long'})}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-gray-500">Año</label>
                                <select id="dash-year" class="w-full bg-gray-50 border rounded-lg p-2 text-sm">
                                    ${Array.from({length:5}, (_,i) => `<option value="${new Date().getFullYear()-i}" ${i===0?'selected':''}>${new Date().getFullYear()-i}</option>`).join('')}
                                </select>
                            </div>
                        </div>                        <button onclick="loadDashboardData()" class="w-full mt-3 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">Actualizar Datos</button>
                    </div>

                    <div id="dash-stats" class="grid grid-cols-2 gap-3">
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                            <p class="text-xs text-gray-500 uppercase">Total Piezas</p>
                            <p class="text-2xl font-bold text-gray-800" id="stat-piezas">-</p>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                            <p class="text-xs text-gray-500 uppercase">Suéteres Completos</p>
                            <p class="text-2xl font-bold text-blue-600" id="stat-sueteres">-</p>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <h4 class="font-bold text-gray-700 mb-2 text-sm">Distribución por Categoría</h4>
                        <div class="relative h-64">
                            <canvas id="catChart"></canvas>
                        </div>
                    </div>
                    
                    <div id="dash-loading" class="hidden text-center py-10">
                        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8 mx-auto"></div>
                    </div>
                </div>
            `;
            loadDashboardData();
        }

        async function loadDashboardData() {
            const month = parseInt(document.getElementById('dash-month').value);
            const year = parseInt(document.getElementById('dash-year').value);
            
            // Construir rango de fechas para el mes seleccionado
            const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
            const lastDay = new Date(year, month, 0).getDate();
            const endDate = `${year}-${String(month).padStart(2,'0')}-${lastDay}`;

            document.getElementById('dash-loading').classList.remove('hidden');

            // Obtener registros del periodo
            const { data: registros, error } = await supabase
                .from('registros')
                .select('id, total_piezas, total_sueteres')
                .gte('fecha', startDate)
                .lte('fecha', endDate)
                .eq('usuario_id', currentUser.id);

            if(error) { console.error(error); return; }
            const totalPiezas = registros.reduce((acc, r) => acc + r.total_piezas, 0);
            const totalSueteres = registros.reduce((acc, r) => acc + parseFloat(r.total_sueteres), 0);

            document.getElementById('stat-piezas').textContent = totalPiezas.toLocaleString();
            document.getElementById('stat-sueteres').textContent = totalSueteres.toLocaleString(undefined, {minimumFractionDigits: 2});

            // Obtener desglose por categoría usando los IDs de los registros encontrados
            if(registros.length > 0) {
                const regIds = registros.map(r => r.id);
                const { data: items } = await supabase
                    .from('registro_items')
                    .select('categoria, cantidad')
                    .in('registro_id', regIds);

                // Agrupar por categoría
                const catMap = {};
                items.forEach(i => {
                    catMap[i.categoria] = (catMap[i.categoria] || 0) + i.cantidad;
                });

                renderChart(catMap);
            } else {
                renderChart({});
            }

            document.getElementById('dash-loading').classList.add('hidden');
        }

        function renderChart(dataMap) {
            const ctx = document.getElementById('catChart').getContext('2d');
            
            if(currentChart) currentChart.destroy();

            const labels = Object.keys(dataMap);
            const values = Object.values(dataMap);

            if(labels.length === 0) {
                ctx.font = "14px sans-serif";
                ctx.fillStyle = "#9ca3af";
                ctx.textAlign = "center";
                ctx.fillText("Sin datos para este periodo", ctx.canvas.width/2, ctx.canvas.height/2);
                return;
            }

            currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,                        backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#6366f1','#14b8a6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
